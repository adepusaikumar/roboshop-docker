name: roboshop
services:
  catalogue:
    build: "./catalogue"
    image: adepusaikumar/catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb
    
  user:
    build: "./user"
    image: adepusaikumar/user:1.0.0
    container_name: user
    depends_on:
      - redis
      - mongodb

  cart:
    build: "./cart"
    image: adepusaikumar/cart:1.0.0
    container_name: cart
    depends_on:
      - redis
      - catalogue

  shipping:
    build: "./shipping"
    image: adepusaikumar/shipping:1.0.0
    container_name: shipping
    depends_on:
      - mysql
      - cart

  payment:
    build: "./payment"
    image: adepusaikumar/payment:1.0.0
    container_name: payment
    environment:
      CART_HOST: "cart"
      CART_PORT: "8080"
      USER_HOST: "user"
      USER_PORT: "8080"
      AMQP_HOST: "rabbitmq"
      AMQP_USER: "roboshop"
      AMQP_PASS: "roboshop123"
    depends_on:
      - rabbitmq
      - cart
      - user

  frontend:
    build: './frontend'
    image: adepusaikumar/frontend:1.0.0
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user
      - cart
      - shipping
      - payment

  mongodb:
    build: "./mongodb"
    image: adepusaikumar/mongodb:1.0.0
    container_name: mongodb
    volumes:
      - mongodb:/data/db

  redis:
    image: redis:7.0
    container_name: redis
    volumes:
      - redis:/data

  mysql:
    build: "./mysql"
    image: adepusaikumar/mysql:1.0.0
    container_name: mysql
    volumes:
      - mysql:/var/lib/mysql
  
  rabbitmq:
    image: rabbitmq:3
    container_name: rabbitmq
    volumes:
      - rabbitmq:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
      
networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true, you need to create network manually

volumes:
  mongodb: # docker volume create mongodb
  redis:
  mysql:
  rabbitmq: